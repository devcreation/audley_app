workflows:

  # ─── Android APK Build ───
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Set up Flutter project scaffold
        script: |
          echo "==> Creating Flutter project scaffold..."
          flutter create --org com.distantfrontiers --project-name audley_achievers /tmp/scaffold --platforms android,ios

          echo "==> Backing up source code..."
          cp -r "$CM_BUILD_DIR/lib" /tmp/my_lib
          cp "$CM_BUILD_DIR/pubspec.yaml" /tmp/my_pubspec.yaml

          if [ -d "$CM_BUILD_DIR/assets" ]; then
            cp -r "$CM_BUILD_DIR/assets" /tmp/my_assets
          fi

          echo "==> Copying scaffold platform directories..."
          rm -rf "$CM_BUILD_DIR/android"
          cp -r /tmp/scaffold/android "$CM_BUILD_DIR/android"

          rm -rf "$CM_BUILD_DIR/ios"
          cp -r /tmp/scaffold/ios "$CM_BUILD_DIR/ios"

          for f in .metadata; do
            if [ -f "/tmp/scaffold/$f" ]; then
              cp "/tmp/scaffold/$f" "$CM_BUILD_DIR/$f"
            fi
          done

          echo "==> Restoring source code on top of scaffold..."
          rm -rf "$CM_BUILD_DIR/lib"
          cp -r /tmp/my_lib "$CM_BUILD_DIR/lib"
          cp /tmp/my_pubspec.yaml "$CM_BUILD_DIR/pubspec.yaml"

          if [ -d "/tmp/my_assets" ]; then
            rm -rf "$CM_BUILD_DIR/assets"
            cp -r /tmp/my_assets "$CM_BUILD_DIR/assets"
          fi

          echo "==> Done! Project structure is ready."

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Set app display name
        script: |
          dart run rename setAppName --targets android,ios --value "Audley's Top Performers Incentive"

      - name: Generate app icon
        script: |
          dart run flutter_launcher_icons

      - name: Build debug APK
        script: |
          flutter build apk --debug 2>&1

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt


  # ─── iOS IPA Build (Testing) ───
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.distantfrontiers.audleyAchievers
    scripts:
      - name: Set up Flutter project scaffold
        script: |
          echo "==> Creating Flutter project scaffold..."
          flutter create --org com.distantfrontiers --project-name audley_achievers /tmp/scaffold --platforms android,ios

          echo "==> Backing up source code..."
          cp -r "$CM_BUILD_DIR/lib" /tmp/my_lib
          cp "$CM_BUILD_DIR/pubspec.yaml" /tmp/my_pubspec.yaml

          if [ -d "$CM_BUILD_DIR/assets" ]; then
            cp -r "$CM_BUILD_DIR/assets" /tmp/my_assets
          fi

          echo "==> Copying scaffold platform directories..."
          rm -rf "$CM_BUILD_DIR/android"
          cp -r /tmp/scaffold/android "$CM_BUILD_DIR/android"

          rm -rf "$CM_BUILD_DIR/ios"
          cp -r /tmp/scaffold/ios "$CM_BUILD_DIR/ios"

          for f in .metadata; do
            if [ -f "/tmp/scaffold/$f" ]; then
              cp "/tmp/scaffold/$f" "$CM_BUILD_DIR/$f"
            fi
          done

          echo "==> Restoring source code on top of scaffold..."
          rm -rf "$CM_BUILD_DIR/lib"
          cp -r /tmp/my_lib "$CM_BUILD_DIR/lib"
          cp /tmp/my_pubspec.yaml "$CM_BUILD_DIR/pubspec.yaml"

          if [ -d "/tmp/my_assets" ]; then
            rm -rf "$CM_BUILD_DIR/assets"
            cp -r /tmp/my_assets "$CM_BUILD_DIR/assets"
          fi

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Set app display name
        script: |
          dart run rename setAppName --targets android,ios --value "Audley's Top Performers Incentive"

      - name: Generate app icon
        script: |
          dart run flutter_launcher_icons

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa


  # ─── Web Build (Test on any iPhone without Apple account) ───
  web-workflow:
    name: Web Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Set up Flutter project scaffold
        script: |
          flutter create --org com.distantfrontiers --project-name audley_achievers /tmp/scaffold --platforms web

          cp -r "$CM_BUILD_DIR/lib" /tmp/my_lib
          cp "$CM_BUILD_DIR/pubspec.yaml" /tmp/my_pubspec.yaml
          if [ -d "$CM_BUILD_DIR/assets" ]; then cp -r "$CM_BUILD_DIR/assets" /tmp/my_assets; fi

          cp -r /tmp/scaffold/web "$CM_BUILD_DIR/web"

          rm -rf "$CM_BUILD_DIR/lib"
          cp -r /tmp/my_lib "$CM_BUILD_DIR/lib"
          cp /tmp/my_pubspec.yaml "$CM_BUILD_DIR/pubspec.yaml"
          if [ -d "/tmp/my_assets" ]; then rm -rf "$CM_BUILD_DIR/assets"; cp -r /tmp/my_assets "$CM_BUILD_DIR/assets"; fi

      - name: Install dependencies
        script: flutter pub get

      - name: Build web
        script: flutter build web --release --base-href /audleyachievers/app/

      - name: Fix web assets
        script: |
          # Add Material Icons font for proper icon rendering
          sed -i 's|</head>|<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>\n</head>|' build/web/index.html

      - name: Package web build
        script: |
          cd build/web && zip -r ../../web-build.zip .

    artifacts:
      - web-build.zip
